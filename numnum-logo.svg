<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8475F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AD1457;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8475F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AD1457;stop-opacity:1" />
    </linearGradient>

    <clipPath id="topHeartClip">
      <path d="M200 205
               C155 172, 105 155, 105 108
               C105 78, 125 52, 152 52
               C174 52, 190 67, 200 84
               C210 67, 226 52, 248 52
               C275 52, 295 78, 295 108
               C295 155, 245 172, 200 205Z"/>
    </clipPath>

    <clipPath id="bottomHeartClip">
      <path d="M200 225
               C155 258, 105 275, 105 322
               C105 352, 125 378, 152 378
               C174 378, 190 363, 200 346
               C210 363, 226 378, 248 378
               C275 378, 295 352, 295 322
               C295 275, 245 258, 200 225Z"/>
    </clipPath>
  </defs>

  <!-- TOP BASE BAR -->
  <rect x="95" y="42" width="210" height="10" rx="5" fill="url(#baseGrad)"/>

  <!-- TOP HEART -->
  <path d="M200 205
           C155 172, 105 155, 105 108
           C105 78, 125 52, 152 52
           C174 52, 190 67, 200 84
           C210 67, 226 52, 248 52
           C275 52, 295 78, 295 108
           C295 155, 245 172, 200 205Z"
        fill="url(#warmGrad)"/>

  <!-- SAND IN TOP HEART — single consistent fill, no separate triangle -->
  <g clip-path="url(#topHeartClip)">
    <path d="M105 120
             L295 120
             L295 155 C275 165, 248 178, 225 190 L200 205 L175 190 C152 178, 125 165, 105 155Z"
          fill="url(#goldGrad)" opacity="0.6"/>
    <!-- Grain texture -->
    <circle cx="140" cy="130" r="2.2" fill="#E6A817" opacity="0.5"/>
    <circle cx="158" cy="138" r="1.6" fill="#DAA520" opacity="0.45"/>
    <circle cx="175" cy="128" r="2.0" fill="#E6A817" opacity="0.5"/>
    <circle cx="190" cy="140" r="1.4" fill="#D4A017" opacity="0.4"/>
    <circle cx="210" cy="135" r="1.8" fill="#DAA520" opacity="0.5"/>
    <circle cx="228" cy="128" r="2.1" fill="#E6A817" opacity="0.45"/>
    <circle cx="245" cy="138" r="1.5" fill="#D4A017" opacity="0.4"/>
    <circle cx="260" cy="130" r="1.9" fill="#DAA520" opacity="0.5"/>
    <circle cx="150" cy="148" r="1.3" fill="#E6A817" opacity="0.35"/>
    <circle cx="170" cy="155" r="1.7" fill="#DAA520" opacity="0.4"/>
    <circle cx="195" cy="160" r="1.5" fill="#D4A017" opacity="0.35"/>
    <circle cx="215" cy="158" r="1.8" fill="#E6A817" opacity="0.4"/>
    <circle cx="235" cy="150" r="1.4" fill="#DAA520" opacity="0.35"/>
    <circle cx="200" cy="175" r="1.2" fill="#D4A017" opacity="0.3"/>
    <circle cx="188" cy="182" r="1.0" fill="#DAA520" opacity="0.25"/>
    <circle cx="212" cy="180" r="1.1" fill="#E6A817" opacity="0.25"/>
  </g>

  <!-- NARROW NECK -->
  <path d="M191 205 L209 205 L213 225 L187 225Z" fill="url(#warmGrad)"/>

  <!-- FALLING SAND STREAM through neck -->
  <rect x="198" y="200" width="4" height="30" rx="2" fill="#FFC107" opacity="0.7"/>

  <!-- Animated grains in neck area -->
  <circle cx="196" cy="212" r="1.5" fill="#FFC107" opacity="0.5">
    <animate attributeName="cy" values="212;222;212" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="204" cy="218" r="1.2" fill="#E6A817" opacity="0.4">
    <animate attributeName="cy" values="218;226;218" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- BOTTOM HEART (inverted) -->
  <path d="M200 225
           C155 258, 105 275, 105 322
           C105 352, 125 378, 152 378
           C174 378, 190 363, 200 346
           C210 363, 226 378, 248 378
           C275 378, 295 352, 295 322
           C295 275, 245 258, 200 225Z"
        fill="url(#warmGrad)"/>

  <!-- SAND IN BOTTOM HEART — single consistent fill, no separate mound triangle -->
  <g clip-path="url(#bottomHeartClip)">
    <!-- Sand bed filling the bottom of the heart -->
    <path d="M105 305
             C105 352, 125 378, 152 378
             C174 378, 190 363, 200 346
             C210 363, 226 378, 248 378
             C275 378, 295 352, 295 305
             C280 295, 255 288, 230 283
             C215 280, 200 278, 200 278
             C200 278, 185 280, 170 283
             C145 288, 120 295, 105 305Z"
          fill="url(#goldGrad)" opacity="0.65"/>
    <!-- Grain texture -->
    <circle cx="155" cy="355" r="2.2" fill="#E6A817" opacity="0.5"/>
    <circle cx="172" cy="348" r="1.6" fill="#DAA520" opacity="0.45"/>
    <circle cx="188" cy="360" r="2.0" fill="#E6A817" opacity="0.4"/>
    <circle cx="200" cy="340" r="1.8" fill="#D4A017" opacity="0.5"/>
    <circle cx="215" cy="355" r="1.5" fill="#DAA520" opacity="0.45"/>
    <circle cx="232" cy="345" r="2.1" fill="#E6A817" opacity="0.5"/>
    <circle cx="248" cy="358" r="1.4" fill="#D4A017" opacity="0.4"/>
    <circle cx="165" cy="335" r="1.7" fill="#DAA520" opacity="0.4"/>
    <circle cx="180" cy="325" r="1.3" fill="#E6A817" opacity="0.35"/>
    <circle cx="200" cy="318" r="1.5" fill="#D4A017" opacity="0.35"/>
    <circle cx="220" cy="328" r="1.8" fill="#DAA520" opacity="0.4"/>
    <circle cx="240" cy="335" r="1.4" fill="#E6A817" opacity="0.35"/>
    <circle cx="195" cy="300" r="1.2" fill="#D4A017" opacity="0.3"/>
    <circle cx="208" cy="295" r="1.1" fill="#DAA520" opacity="0.3"/>
    <circle cx="185" cy="310" r="1.3" fill="#E6A817" opacity="0.3"/>
    <circle cx="218" cy="308" r="1.0" fill="#D4A017" opacity="0.25"/>
  </g>

  <!-- VISIBLE TRICKLE from neck down to sand bed in bottom heart -->
  <!-- Main trickle stream -->
  <rect x="198" y="225" width="4" height="50" rx="2" fill="#FFC107" opacity="0.6"/>
  <!-- Scattered grains along the trickle path -->
  <circle cx="200" cy="235" r="1.8" fill="#FFC107" opacity="0.55">
    <animate attributeName="cy" values="235;275;235" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="197" cy="248" r="1.4" fill="#E6A817" opacity="0.5">
    <animate attributeName="cy" values="248;278;248" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="203" cy="258" r="1.6" fill="#DAA520" opacity="0.45">
    <animate attributeName="cy" values="258;280;258" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="199" cy="268" r="1.3" fill="#FFC107" opacity="0.4">
    <animate attributeName="cy" values="268;282;268" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- BOTTOM BASE BAR -->
  <rect x="95" y="378" width="210" height="10" rx="5" fill="url(#baseGrad)"/>

  <!-- BRAND NAME -->
  <text x="200" y="440" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#2D2D2D" letter-spacing="12">NUMNUM</text>
</svg>