<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080810">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NumNum Workout</title>
<!-- v2.0 - Weekly Overview + Completion Tracking -->
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* Dark theme (default) — Obsidian Flow */
:root, [data-theme="dark"] {
  --bg: #080810;
  --card: rgba(255,255,255,0.025);
  --card-border: rgba(255,255,255,0.08);
  --accent: #7c6ef0;
  --accent-dim: #6558d4;
  --nn-warm: #a78bfa;
  --nn-gold: #2dd4bf;
  --text: #f0f0f8;
  --text-dim: #9b97b0;
  --text-muted: #5c5775;
  --green: #34d399;
  --yellow: #fbbf24;
  --input-bg: rgba(255,255,255,0.03);
}

/* Light theme */
[data-theme="light"] {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card-border: #e0e0e6;
  --accent: #7c6ef0;
  --accent-dim: #6558d4;
  --nn-warm: #a78bfa;
  --nn-gold: #2dd4bf;
  --text: #1a1a2e;
  --text-dim: #666;
  --text-muted: #999;
  --green: #22c55e;
  --yellow: #d97706;
  --input-bg: #f0f0f5;
}

body {
  font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(ellipse 50% 60% at 10% 0%, rgba(124,110,240,0.08) 0%, transparent 60%), radial-gradient(ellipse 40% 50% at 90% 100%, rgba(45,212,191,0.05) 0%, transparent 60%), var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
  overflow-x: hidden;
}

/* --- Login Screen --- */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  height: 100dvh;
  padding: 20px 24px;
  overflow: hidden;
  box-sizing: border-box;
}
.login-card {
  width: 100%;
  max-width: 380px;
  text-align: center;
  max-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.login-logo { margin-bottom: clamp(8px, 2vh, 24px); }
.login-logo svg { width: clamp(48px, 10vh, 80px); height: auto; }
.login-title {
  font-size: clamp(20px, 4vh, 28px);
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}
.login-subtitle {
  font-size: clamp(12px, 1.8vh, 14px);
  color: var(--text-dim);
  margin-bottom: clamp(12px, 3vh, 36px);
}
.login-form {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: clamp(16px, 3vh, 28px) 24px;
  text-align: left;
  width: 100%;
}
.login-field { margin-bottom: clamp(8px, 1.5vh, 16px); }
.login-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.login-field input {
  width: 100%;
  padding: clamp(10px, 1.5vh, 14px) 16px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.login-field input:focus { border-color: var(--accent); }
.login-field input::placeholder { color: var(--text-muted); }
.login-remember {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
.login-remember input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: var(--accent);
  cursor: pointer;
}
.login-remember span {
  font-size: 14px;
  color: var(--text-dim);
}
.login-error {
  color: var(--accent);
  font-size: 13px;
  margin-bottom: 12px;
  min-height: 18px;
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #FF7043, #E8475F, #AD1457);
  color: white;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.98); opacity: 0.9; }
.btn-secondary {
  background: var(--card);
  border: 1px solid var(--card-border);
}


/* --- Header --- */
.header {
  padding: 16px 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
  border-bottom: 1px solid var(--card-border);
}
.header-left h2 { font-size: 18px; }
.header-left span { font-size: 13px; color: var(--text-dim); }
.header-right { display: flex; gap: 8px; }
.header-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Week Navigation --- */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  gap: 10px;
}
.week-nav-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.week-nav-btn:disabled { opacity: 0.3; cursor: default; }
.week-info { text-align: center; flex: 1; }
.week-info .week-label { font-size: 18px; font-weight: 700; }
.week-info .week-dates { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

/* --- Week Overview Cards --- */
.week-overview { padding: 0 16px 100px; }
.day-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
  position: relative;
}
.day-card:active { transform: scale(0.98); }
.day-card.today-card { border-color: var(--accent); }
.day-card.rest-card { opacity: 0.6; cursor: default; }
.day-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.day-card-title {
  font-size: 16px;
  font-weight: 700;
}
.day-card-weekday {
  font-size: 13px;
  color: var(--text-dim);
}
.day-card-exercises {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
}
.day-card-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--card-border);
}
.day-card-stats .archive-day-btn { margin-left: auto; }
.day-stat {
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.day-stat .stat-value { font-weight: 700; color: var(--text); }
.day-stat .stat-label { color: var(--text-dim); }
.day-stat.complete .stat-value { color: var(--green); }

/* Completion ring on day card */
.day-card-ring {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
}
.day-card-ring svg { transform: rotate(-90deg); }
.day-card-ring circle { fill: none; stroke-width: 4; }
.day-card-ring .ring-bg { stroke: var(--card-border); }
.day-card-ring .ring-fg { stroke: var(--accent); stroke-linecap: round; }
.day-card-ring .ring-fg.complete { stroke: var(--green); }
.day-card-pct {
  position: absolute;
  font-size: 10px;
  font-weight: 700;
}

/* Week summary bar */
.week-summary {
  display: flex;
  gap: 12px;
  padding: 12px 20px;
  margin-bottom: 4px;
}
.week-summary-item {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 10px 14px;
  flex: 1;
  text-align: center;
}
.week-summary-item .ws-value {
  font-size: 20px;
  font-weight: 700;
}
.week-summary-item .ws-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* --- Day Navigation (detail view) --- */
.day-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  gap: 10px;
}
.day-nav-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.day-nav-btn:disabled { opacity: 0.3; cursor: default; }
.day-info { text-align: center; flex: 1; cursor: pointer; }
.day-info .day-week-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }
.day-info .day-label { font-size: 22px; font-weight: 700; margin-top: 2px; }
.day-info .day-date { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* Sticky day detail header */
.day-detail-sticky {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding-bottom: 4px;
  border-bottom: 1px solid var(--card-border);
}

/* Back to week: tap day header area */

/* Day detail stats bar */
.day-detail-stats {
  display: flex;
  gap: 12px;
  padding: 0 20px 12px;
}
.day-detail-stat {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 10px 14px;
  flex: 1;
  text-align: center;
}
.day-detail-stat .dds-value { font-size: 18px; font-weight: 700; }
.day-detail-stat .dds-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* --- Progress Bar --- */
.progress-bar {
  margin: 0 20px 16px;
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: visible;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--nn-gold));
  border-radius: 3px;
  transition: width 0.3s;
  box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(124,110,240,0.3);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--nn-gold);
  box-shadow: 0 0 6px var(--nn-gold);
}

/* --- Exercise Groups --- */
.workout-content { padding: 0 16px 100px; }
.group-container { margin-bottom: 16px; }
.group-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 8px;
}
.group-label.superset { background: #1e3a5f; color: #60a5fa; }
.group-label.circuit { background: #3b1f5e; color: #c084fc; }

.exercise-card {
  background: var(--card);
  border: 1px solid rgba(124,110,240,0.25);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 8px;
}
.exercise-card.in-superset { border-left: 3px solid #60a5fa; }
.exercise-card.in-circuit { border-left: 3px solid #c084fc; }

.exercise-name { font-size: 17px; font-weight: 700; margin-bottom: 10px; }

.exercise-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}
.meta-item {
  text-align: center;
  padding: 8px 4px;
  background: var(--input-bg);
  border-radius: 8px;
}
.meta-item .meta-value { font-size: 16px; font-weight: 700; }
.meta-item .meta-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.exercise-instruction {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  padding: 10px 12px;
  background: var(--input-bg);
  border-radius: 8px;
  margin-bottom: 12px;
}

/* --- Set Logging --- */
.sets-log { margin-top: 12px; }
.sets-log-header {
  display: grid;
  grid-template-columns: 40px 1fr 1fr 44px;
  gap: 8px;
  padding: 0 4px 6px;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.set-row {
  display: grid;
  grid-template-columns: 40px 1fr 1fr 44px;
  gap: 8px;
  margin-bottom: 6px;
  align-items: center;
}
.set-num { font-size: 14px; font-weight: 700; color: var(--text-dim); text-align: center; }
.set-input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 15px;
  text-align: center;
}
.set-input::placeholder { color: var(--text-muted); }
.set-input:disabled { opacity: 0.5; }
.set-check {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 2px solid var(--card-border);
  background: transparent;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.set-check.done { background: linear-gradient(135deg, #7c6ef0, #a78bfa); border-color: #7c6ef0; color: #fff; }
.set-check:disabled { opacity: 0.5; cursor: default; }

/* --- Notes --- */
.exercise-notes { margin-top: 10px; }
.notes-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  resize: none;
  min-height: 40px;
}
.notes-input::placeholder { color: var(--text-muted); }

/* --- Rest Day --- */
.rest-day { text-align: center; padding: 80px 30px; }
.rest-day .rest-icon { font-size: 64px; margin-bottom: 20px; }
.rest-day h2 { font-size: 28px; margin-bottom: 12px; }
.rest-day p { color: var(--text-dim); font-size: 15px; line-height: 1.6; }

/* --- History --- */
.history-screen { padding: 20px; }
.history-screen h2 { margin-bottom: 16px; }
.history-item {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
}
.history-item .hi-date { font-size: 13px; color: var(--text-dim); }
.history-item .hi-exercise { font-weight: 600; margin-top: 2px; }
.history-item .hi-sets { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

/* --- Rest Timer --- */
.rest-timer-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.rest-timer-label {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 32px;
  text-transform: uppercase;
  letter-spacing: 3px;
}
.rest-timer-ring {
  position: relative;
  width: 260px;
  height: 260px;
  margin-bottom: 24px;
}
.rest-timer-ring svg { transform: rotate(-90deg); }
.rest-timer-ring circle {
  fill: none;
  stroke-width: 6;
}
.rest-timer-ring .ring-bg { stroke: var(--card-border); }
.rest-timer-ring .ring-fg {
  stroke: var(--accent);
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s ease;
}
.rest-timer-time {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 72px;
  font-weight: 200;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.rest-timer-controls {
  display: flex;
  gap: 16px;
  margin-top: 16px;
}
.rest-timer-btn {
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.rest-timer-btn.primary {
  background: linear-gradient(135deg, #FF7043, #E8475F);
  color: white;
}
.rest-timer-btn.secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--card-border);
}
.rest-timer-btn:active { transform: scale(0.95); }
.rest-timer-presets {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.rest-timer-presets button {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
}
.rest-timer-presets button:active { background: var(--accent); color: white; }

/* Timer button in exercise card */
.timer-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--accent);
  font-size: 13px;
  cursor: pointer;
  margin-top: 6px;
  transition: all 0.2s;
}
.timer-btn:active { background: var(--accent); color: white; }

/* User initials avatar */
.user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c6ef0, #a78bfa);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  margin-right: 10px;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
.header-left { display: flex; align-items: center; }
.header-left-text { display: flex; flex-direction: column; }

/* --- Theme Toggle --- */
.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 10;
}
.theme-toggle:active { transform: scale(0.9); }

/* --- Logout Confirm Modal --- */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.confirm-box {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
}
.confirm-box h3 {
  font-size: 18px;
  margin-bottom: 8px;
}
.confirm-box p {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.confirm-buttons {
  display: flex;
  gap: 10px;
}
.confirm-buttons button {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.confirm-buttons button:active { transform: scale(0.97); }
.confirm-cancel {
  background: var(--card);
  border: 1px solid var(--card-border) !important;
  color: var(--text);
}
.confirm-logout {
  background: var(--accent);
  color: white;
}

/* --- Settings Links --- */
.settings-links { display: flex; flex-direction: column; gap: 10px; }
.settings-link-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--card-border);
  text-decoration: none; color: var(--text); font-size: 14px;
  transition: border-color 0.2s;
}
.settings-link-item:active { border-color: var(--accent); }
.settings-link-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: white; flex-shrink: 0;
  background: linear-gradient(135deg, #FF7043, #E8475F);
}

/* --- Archive --- */
.archive-day-btn {
  background: none;

<script>
// ==================== DATA ====================
let programData = null;
let currentUser = null;
let currentWeekIndex = 0;
let currentDayIndex = 0;
let allDays = [];
let weekMap = [];
let isViewOnly = false;
let viewMode = 'week';

// ==================== JWT AUTH ====================
let accessToken = null;
let refreshToken = null;

function getStoredTokens() {
  // Check localStorage first (remember me), then sessionStorage
  let at = localStorage.getItem('nn_access_token');
  let rt = localStorage.getItem('nn_refresh_token');
  let user = localStorage.getItem('nn_user');
  if (at && rt && user) return { at, rt, user, storage: 'local' };
  at = sessionStorage.getItem('nn_access_token');
  rt = sessionStorage.getItem('nn_refresh_token');
  user = sessionStorage.getItem('nn_user');
  if (at && rt && user) return { at, rt, user, storage: 'session' };
  return null;
}

function storeTokens(at, rt, userName, remember) {
  accessToken = at;
  refreshToken = rt;
  const storage = remember ? localStorage : sessionStorage;
  storage.setItem('nn_access_token', at);
  storage.setItem('nn_refresh_token', rt);
  storage.setItem('nn_user', userName);
  // Clear the other storage
  const other = remember ? sessionStorage : localStorage;
  other.removeItem('nn_access_token');
  other.removeItem('nn_refresh_token');
  other.removeItem('nn_user');
  // Also clear legacy keys
  localStorage.removeItem('workout_current_user');
  localStorage.removeItem('workout_auth_token');
  sessionStorage.removeItem('workout_current_user');
  sessionStorage.removeItem('workout_auth_token');
}

function clearTokens() {
  accessToken = null;
  refreshToken = null;
  ['nn_access_token', 'nn_refresh_token', 'nn_user',
   'workout_current_user', 'workout_auth_token'].forEach(k => {
    localStorage.removeItem(k);
    sessionStorage.removeItem(k);
  });
}

async function refreshAccessToken() {
  if (!refreshToken) return false;
  try {
    const resp = await fetch(`${SERVER_URL}/api/auth/refresh`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({refresh_token: refreshToken}),
    });
    if (!resp.ok) return false;
    const data = await resp.json();
    accessToken = data.access_token;
    // Update in whichever storage has the token
    if (localStorage.getItem('nn_access_token')) {
      localStorage.setItem('nn_access_token', accessToken);
    } else {
      sessionStorage.setItem('nn_access_token', accessToken);
    }
    return true;
  } catch { return false; }
}

async function authFetch(url, options = {}) {
  if (!options.headers) options.headers = {};
  if (accessToken) {
    options.headers['Authorization'] = `Bearer ${accessToken}`;
  }
  let resp = await fetch(url, options);
  if (resp.status === 401 && refreshToken) {
    const refreshed = await refreshAccessToken();
    if (refreshed) {
      options.headers['Authorization'] = `Bearer ${accessToken}`;
      resp = await fetch(url, options);
    }
    if (resp.status === 401) {
      clearTokens();
      showLogin('Session expired. Please log in again.');
      throw new Error('auth_expired');
    }
  }
  return resp;
}

// ==================== INIT ====================
async function init() {
  try {
    const resp = await fetch('program.json?v=' + Date.now());
    programData = await resp.json();
  } catch (e) {
    showLogin('Unable to load program data.');
    return;
  }

  // Load exercises database for muscle mapping
  loadExercisesDB();

  // Check for stored JWT tokens
  const stored = getStoredTokens();
  if (stored) {
    accessToken = stored.at;
    refreshToken = stored.rt;
    const userName = stored.user;
    if (programData.users[userName]) {
      // Verify token is still valid by making a quick request
      try {
        const testResp = await authFetch(`${SERVER_URL}/api/health`);
        if (testResp.ok || testResp.status !== 401) {
          isViewOnly = false;
          selectUser(userName);
          return;
        }
      } catch (e) {
        if (e.message === 'auth_expired') return; // showLogin already called
      }
    }
    clearTokens();
  }

  // Legacy migration: check old-style stored credentials
  const legacyUser = localStorage.getItem('workout_current_user') || sessionStorage.getItem('workout_current_user');
  if (legacyUser) {
    // Clear legacy tokens — user must re-login with JWT
    clearTokens();
  }

  showLogin();
}

// ==================== LOGIN ====================
function showLogin(errorMsg) {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('workoutScreen').classList.add('hidden');
  document.getElementById('historyScreen').classList.add('hidden');
  document.getElementById('loginError').textContent = errorMsg || '';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  setTimeout(() => document.getElementById('loginEmail').focus(), 100);
}

function findUserByEmail(email) {
  if (!programData || !programData.users) return null;
  const lower = email.toLowerCase().trim();
  for (const [name, info] of Object.entries(programData.users)) {
    if (info.email && info.email.toLowerCase() === lower) return name;
  }
  return null;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('loginRemember').checked;
  const errorEl = document.getElementById('loginError');

  if (!email) { errorEl.textContent = 'Please enter your email.'; return; }
  if (!password) { errorEl.textContent = 'Please enter your password.'; return; }

  errorEl.textContent = 'Signing in...';

  try {
    const resp = await fetch(`${SERVER_URL}/api/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    const data = await resp.json();

    if (!resp.ok) {
      errorEl.textContent = data.detail || 'Invalid email or password.';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
      return;
    }

    storeTokens(data.access_token, data.refresh_token, data.user_name, remember);
    isViewOnly = false;

    const userInfo = programData.users[data.user_name];
    if (userInfo && !userInfo.email_verified) {
      showVerificationScreen(data.user_name, userInfo.email || email);
    } else {
      selectUser(data.user_name);
    }
  } catch (e) {
    errorEl.textContent = 'Could not reach server. Try again.';
  }
}

// ==================== EMAIL VERIFICATION ====================
let pendingVerifyUser = '';
let pendingVerifyEmail = '';

function showVerificationScreen(userName, email) {
  pendingVerifyUser = userName;
  pendingVerifyEmail = email;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('workoutScreen').classList.add('hidden');
  document.getElementById('verifyScreen').classList.remove('hidden');
  const masked = email.replace(/^(.{2})(.*)(@.*)$/, (m, a, b, c) => a + '*'.repeat(b.length) + c);
  document.getElementById('verifySubtitle').textContent = `We've sent a 6-digit code to ${masked}`;
  document.getElementById('verifyCode').value = '';
  document.getElementById('verifyError').textContent = '';
  sendVerificationCode();
}

async function sendVerificationCode() {
  try {
    const resp = await fetch(`${SERVER_URL}/api/send-verification`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: pendingVerifyEmail, user: pendingVerifyUser}),
    });
    const data = await resp.json();
    if (data.dev_code) {
      // Dev mode — auto-fill for testing
      document.getElementById('verifyCode').value = data.dev_code;
      document.getElementById('verifyError').textContent = 'Dev mode: code auto-filled (SMTP not configured)';
      document.getElementById('verifyError').style.color = 'var(--accent)';
    }
  } catch (e) {
    console.warn('[verify] Failed to send code:', e);
  }
}

function resendVerification() {
  document.getElementById('verifyError').textContent = 'Sending new code...';
  document.getElementById('verifyError').style.color = 'var(--text-dim)';
  sendVerificationCode().then(() => {
    document.getElementById('verifyError').textContent = 'New code sent!';
    document.getElementById('verifyError').style.color = 'var(--green, #44b700)';
  });
}

async function submitVerification() {
  const code = document.getElementById('verifyCode').value.trim();
  const errorEl = document.getElementById('verifyError');
  errorEl.style.color = '';
  if (!code || code.length !== 6) {
    errorEl.textContent = 'Please enter the 6-digit code.';
    return;
  }
  try {
    const resp = await fetch(`${SERVER_URL}/api/verify-email`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: pendingVerifyEmail, code, user: pendingVerifyUser}),
    });
    const data = await resp.json();
    if (data.verified) {
      // Update local programData
      if (programData.users[pendingVerifyUser]) {
        programData.users[pendingVerifyUser].email_verified = true;
      }
      document.getElementById('verifyScreen').classList.add('hidden');
      selectUser(pendingVerifyUser);
    } else {
      errorEl.textContent = data.error || 'Verification failed.';
    }
  } catch (e) {
    errorEl.textContent = 'Could not reach server. Try again.';
  }
}

function skipVerification() {
  document.getElementById('verifyScreen').classList.add('hidden');
  selectUser(pendingVerifyUser);
}

// ==================== USER SELECTION ====================
function selectUser(name) {
  currentUser = name;

  const userInfo = programData.users[name];
  const program = userInfo.program ? programData.programs[userInfo.program] : null;

  allDays = [];
  weekMap = [];

  if (program) {
    let dayIdx = 0;
    for (const week of program.weeks) {
      const startIdx = dayIdx;
      for (const day of week.days) {
        allDays.push({ ...day, week: week.week });
        dayIdx++;
      }
      weekMap.push({ weekNum: week.week, startDayIndex: startIdx, endDayIndex: dayIdx - 1 });
    }
  }

  // Determine which week to show initially (based on today's date)
  currentWeekIndex = 0;
  if (program && userInfo.startDate) {
    const start = new Date(userInfo.startDate + 'T00:00:00');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
    const todayDayIndex = Math.max(0, Math.min(diffDays, allDays.length - 1));
    for (let w = 0; w < weekMap.length; w++) {
      if (todayDayIndex >= weekMap[w].startDayIndex && todayDayIndex <= weekMap[w].endDayIndex) {
        currentWeekIndex = w;
        break;
      }
    }
  }

  document.getElementById('headerName').textContent = name;
  document.getElementById('headerProgram').textContent = userInfo.program || 'No program';
  // Set avatar initials
  const nameParts = name.trim().split(/\s+/);
  const initials = nameParts.length >= 2 ? (nameParts[0][0] + nameParts[nameParts.length - 1][0]).toUpperCase() : name.slice(0, 2).toUpperCase();
  document.getElementById('headerAvatar').textContent = initials;

  if (!program) {
    // No program assigned — show no-program screen
    viewMode = 'noprogram';
  } else if (userInfo.startDate) {
    const start = new Date(userInfo.startDate + 'T00:00:00');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
    const todayDayIndex = Math.max(0, Math.min(diffDays, allDays.length - 1));
    currentDayIndex = todayDayIndex;
    viewMode = 'day';
  } else {
    viewMode = 'week';
  }

  archiveView = 'current';
  showWorkout();
  initWhoop();
  if (program) {
    pullDataFromServer().then(() => syncAllToServer());
  }
}

// ==================== WEEK OVERVIEW ====================
function changeWeek(delta) {
  const next = findNextVisibleWeek(currentWeekIndex, delta);
  if (next !== null) {
    currentWeekIndex = next;
    renderWeekOverview();
    updateArchiveUI();
  }
}

function renderWeekOverview() {
  const wk = weekMap[currentWeekIndex];
  const userInfo = programData.users[currentUser];
  const startDate = userInfo.startDate ? new Date(userInfo.startDate + 'T00:00:00') : null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Week label
  document.getElementById('weekLabel').textContent = `Week ${wk.weekNum}`;

  // Week date range
  if (startDate) {
    const weekStart = new Date(startDate);
    weekStart.setDate(weekStart.getDate() + wk.startDayIndex);
    const weekEnd = new Date(startDate);
    weekEnd.setDate(weekEnd.getDate() + wk.endDayIndex);
    const opts = { month: 'short', day: 'numeric' };
    document.getElementById('weekDates').textContent =
      weekStart.toLocaleDateString('en-US', opts) + ' – ' + weekEnd.toLocaleDateString('en-US', opts);
  } else {
    document.getElementById('weekDates').textContent = '';
  }

  document.getElementById('prevWeek').disabled = findNextVisibleWeek(currentWeekIndex, -1) === null;
  document.getElementById('nextWeek').disabled = findNextVisibleWeek(currentWeekIndex, 1) === null;

  // Calculate week-level stats
  let weekTotalSets = 0, weekDoneSets = 0, weekTonnage = 0;

  const archivedDays = getArchivedDays();
  const cardsHtml = [];
  for (let i = wk.startDayIndex; i <= wk.endDayIndex; i++) {
    const day = allDays[i];
    const dayIsArchived = archivedDays.includes(i);

    // Filter non-rest days based on archive view
    if (!day.isRest) {
      if (archiveView === 'current' && dayIsArchived) continue;
      if (archiveView === 'archived' && !dayIsArchived) continue;
    } else if (archiveView === 'archived') {
      continue; // Don't show rest days in archived view
    }

    const dayDateObj = startDate ? new Date(startDate.getTime() + i * 86400000) : null;
    const isToday = dayDateObj && dayDateObj.getTime() === today.getTime();
    const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const weekdayName = dayDateObj
      ? dayDateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
      : DAY_NAMES[(day.day - 1) % 7] || `Day ${day.day}`;

    if (day.isRest) {
      cardsHtml.push(`
        <div class="day-card rest-card ${isToday ? 'today-card' : ''}">
          <div class="day-card-header">
            <div>
              <div class="day-card-title">Day ${day.day} · Rest</div>
              <div class="day-card-weekday">${weekdayName}</div>
            </div>
          </div>
          <div class="day-card-exercises">&#x1f9d8; ${day.restNote || 'Recovery day'}</div>
        </div>`);
      continue;
    }

    // Get exercise names and stats
    const savedData = loadDayData(i);
    let exerciseNames = [];
    let totalSets = 0, doneSets = 0, tonnage = 0;

    for (const group of day.exerciseGroups) {
      for (const ex of group.exercises) {
        exerciseNames.push(ex.name);
        const exKey = ex.order + '_' + ex.name.replace(/\s+/g, '_');
        const exData = savedData[exKey] || {};
        for (let s = 1; s <= ex.sets; s++) {
          totalSets++;
          const sd = exData['set' + s] || {};
          if (sd.done) {
            doneSets++;
            const w = parseFloat(sd.weight) || 0;
            const r = parseInt(sd.reps) || 0;
            tonnage += w * r;
          }
        }
      }
    }

    weekTotalSets += totalSets;
    weekDoneSets += doneSets;
    weekTonnage += tonnage;

    const pct = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;
    const circumference = 100.5; // 2*PI*16
    const offset = circumference * (1 - pct / 100);
    const ringColor = pct === 100 ? 'complete' : '';

    const summaryText = exerciseNames.length > 4
      ? exerciseNames.slice(0, 4).join(', ') + ` +${exerciseNames.length - 4} more`
      : exerciseNames.join(', ');

    cardsHtml.push(`
      <div class="day-card ${isToday ? 'today-card' : ''}" onclick="openDay(${i})">
        <div class="day-card-header">
          <div>
            <div class="day-card-title">Day ${day.day}${isToday ? ' · Today' : ''}</div>
            <div class="day-card-weekday">${weekdayName}</div>
          </div>
          <div class="day-card-ring">
            <svg width="40" height="40" viewBox="0 0 40 40">
              <circle class="ring-bg" cx="20" cy="20" r="16" fill="none" stroke-width="4" stroke="var(--card-border)"/>
              <circle class="ring-fg ${ringColor}" cx="20" cy="20" r="16" fill="none" stroke-width="4"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
                style="transform:rotate(-90deg);transform-origin:center;"/>
            </svg>
          </div>
        </div>
        <div class="day-card-exercises">${summaryText}</div>
        <div class="day-card-stats">
          <div class="day-stat ${pct === 100 ? 'complete' : ''}">
            <span class="stat-value">${doneSets}/${totalSets}</span>
            <span class="stat-label">sets</span>
          </div>
          ${tonnage > 0 ? `<div class="day-stat"><span class="stat-value">${formatTonnage(tonnage)}</span><span class="stat-label">tonnage</span></div>` : ''}
          <button class="archive-day-btn ${isDayArchived(i) ? 'archived' : ''}" onclick="event.stopPropagation();toggleDayArchive(${i})" title="${isDayArchived(i) ? 'Unarchive day' : 'Archive day'}">&#x1f4e5;</button>
        </div>
      </div>`);
  }

  document.getElementById('weekCards').innerHTML = cardsHtml.join('');

  // Week summary bar
  const weekPct = weekTotalSets > 0 ? Math.round((weekDoneSets / weekTotalSets) * 100) : 0;
  document.getElementById('weekSummary').innerHTML = `
    <div class="week-summary-item">
      <div class="ws-value" style="color:${weekPct === 100 ? 'var(--green)' : 'var(--text)'}">${weekPct}%</div>
      <div class="ws-label">Complete</div>
    </div>
    <div class="week-summary-item">
      <div class="ws-value">${weekDoneSets}/${weekTotalSets}</div>
      <div class="ws-label">Sets</div>
    </div>
    <div class="week-summary-item">
      <div class="ws-value">${formatTonnage(weekTonnage)}</div>
      <div class="ws-label">Tonnage</div>
    </div>`;
}

function formatTonnage(kg) {
  if (kg >= 1000) return (kg / 1000).toFixed(1) + 't';
  return kg.toFixed(0) + 'kg';
}

// ==================== OPEN DAY DETAIL ====================
function openDay(globalDayIndex) {
  if (!isViewOnly) saveCurrentDay();
  currentDayIndex = globalDayIndex;
  viewMode = 'day';
  document.getElementById('weekOverview').classList.add('hidden');
  document.getElementById('dayDetail').classList.remove('hidden');
  renderDay();
}

function backToWeek() {
  if (!isViewOnly) saveCurrentDay();
  viewMode = 'week';
  // Set archive view based on whether current day is archived
  archiveView = isDayArchived(currentDayIndex) ? 'archived' : 'current';
  document.getElementById('dayDetail').classList.add('hidden');
  document.getElementById('weekOverview').classList.remove('hidden');
  renderWeekOverview();
  updateArchiveUI();
}

function changeDay(delta) {
  // Navigate across all days (not restricted to current week)
  const newIndex = currentDayIndex + delta;
  if (newIndex >= 0 && newIndex < allDays.length) {
    if (!isViewOnly) saveCurrentDay();
    currentDayIndex = newIndex;
    // Update currentWeekIndex to match
    for (let w = 0; w < weekMap.length; w++) {
      if (currentDayIndex >= weekMap[w].startDayIndex && currentDayIndex <= weekMap[w].endDayIndex) {
        currentWeekIndex = w;
        break;
      }
    }
    renderDay();
  }
}

function renderDay() {
  const day = allDays[currentDayIndex];
  const userInfo = programData.users[currentUser];
  const startDate = userInfo.startDate ? new Date(userInfo.startDate + 'T00:00:00') : null;
  const dayDate = startDate ? new Date(startDate.getTime() + currentDayIndex * 86400000) : null;
  const wk = weekMap[currentWeekIndex];

  document.getElementById('dayWeekLabel').textContent = `Week ${day.week}`;
  document.getElementById('dayLabel').textContent = `Day ${day.day}`;
  document.getElementById('dayDate').textContent = dayDate
    ? dayDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
    : '';
  document.getElementById('prevDay').disabled = currentDayIndex <= 0;
  document.getElementById('nextDay').disabled = currentDayIndex >= allDays.length - 1;

  // Progress within current week
  const daysInWeek = wk.endDayIndex - wk.startDayIndex + 1;
  const dayInWeek = currentDayIndex - wk.startDayIndex + 1;
  const progress = (dayInWeek / daysInWeek) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  const content = document.getElementById('workoutContent');

  if (day.isRest) {
    document.getElementById('dayDetailStats').innerHTML = '';
    content.innerHTML = `
      <div class="rest-day">
        <div class="rest-icon">&#x1f9d8;</div>
        <h2>Rest Day</h2>
        <p>${day.restNote || 'Take it easy today. Recovery is where growth happens.'}</p>
      </div>`;
    return;
  }

  // Calculate day stats (including custom exercises)
  const savedData = loadDayData(currentDayIndex);
  let totalSets = 0, doneSets = 0, tonnage = 0;

  // Include custom exercises in stats
  const customKeyStats = `custom_exercises_${currentUser}_day${currentDayIndex}`;
  let customExStats = [];
  try { customExStats = JSON.parse(localStorage.getItem(customKeyStats) || '[]'); } catch {}
  const allExGroups = [...day.exerciseGroups];
  if (customExStats.length > 0) {
    allExGroups.push({exercises: customExStats.map(ce => ({
      order: ce.order, name: ce.name, sets: ce.sets, reps: String(ce.reps)
    }))});
  }

  for (const group of allExGroups) {
    for (const ex of group.exercises) {
      const exKey = ex.order + '_' + ex.name.replace(/\s+/g, '_');
      const exData = savedData[exKey] || {};
      for (let s = 1; s <= ex.sets; s++) {
        totalSets++;
        const sd = exData['set' + s] || {};
        if (sd.done) {
          doneSets++;
          const w = parseFloat(sd.weight) || 0;
          const r = parseInt(sd.reps) || 0;
          tonnage += w * r;
        }
      }
    }
  }
  const pct = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;

  document.getElementById('dayDetailStats').innerHTML = `
    <div class="day-detail-stat">
      <div class="dds-value" style="color:${pct === 100 ? 'var(--green)' : 'var(--accent)'}">${pct}<span style="font-size:12px;font-weight:600;">%</span></div>
      <div class="dds-label">Complete</div>
    </div>
    <div class="day-detail-stat">
      <div class="dds-value">${doneSets}/${totalSets}</div>
      <div class="dds-label">Sets</div>
    </div>
    <div class="day-detail-stat">
      <div class="dds-value">${formatTonnage(tonnage)}</div>
      <div class="dds-label">Tonnage</div>
    </div>`;

  const disabled = isViewOnly ? 'disabled' : '';
  let html = '';

  // Include custom exercises added by the athlete
  const customKey = `custom_exercises_${currentUser}_day${currentDayIndex}`;
  let customExercises = [];
  try { customExercises = JSON.parse(localStorage.getItem(customKey) || '[]'); } catch {}

  // Add custom exercises as a group if any exist
  const allGroups = [...day.exerciseGroups];
  if (customExercises.length > 0) {
    allGroups.push({
      type: 'single',
      _isCustom: true,
      exercises: customExercises.map(ce => ({
        order: ce.order, name: ce.name, sets: ce.sets, reps: String(ce.reps),
        tempo: '—', rest: '', rpe: '', instruction: 'Custom exercise',
      })),
    });
  }

  for (const group of allGroups) {
    html += '<div class="group-container">';

    if (group._isCustom) {
      html += '<span class="group-label" style="background:var(--accent);color:#fff;">Custom Exercises</span>';
    } else if (group.type === 'superset') {
      html += '<span class="group-label superset">Superset</span>';
    } else if (group.type === 'circuit') {
      html += '<span class="group-label circuit">Circuit</span>';
    }

    for (const ex of group.exercises) {
      const exKey = ex.order + '_' + ex.name.replace(/\s+/g, '_');
      const exData = savedData[exKey] || {};
      const cardClass = group.type !== 'single' ? `in-${group.type}` : '';
      const collapseId = `collapse_${exKey}`;
      // Check if any sets are done
      let setsCompleted = 0;
      for (let cs = 1; cs <= ex.sets; cs++) { if (exData['set' + cs]?.done) setsCompleted++; }
      const summaryText = `${ex.sets} sets × ${ex.reps} reps`;

      html += `<div class="exercise-collapse-header ${cardClass}" onclick="toggleExerciseCollapse('${collapseId}')">
        <div class="exercise-collapse-toggle" id="toggle_${collapseId}">+</div>
        <div class="exercise-collapse-title" style="display:flex;align-items:center;gap:6px;">${getEquipmentIcon(ex.name)} ${ex.name}</div>
        <div class="exercise-collapse-meta" id="meta_${collapseId}">${summaryText}</div>
      </div>
      <div class="exercise-collapse-body" id="${collapseId}">
      <div class="exercise-card ${cardClass}" style="margin-top:-2px;border-top-left-radius:0;border-top-right-radius:0;">
        <div class="exercise-name" style="cursor:pointer;display:flex;align-items:center;gap:8px;" onclick="showWeightHistory('${ex.name.replace(/'/g, "\\'")}')">
          ${getEquipmentIcon(ex.name)} ${ex.name}
        </div>
        <div class="exercise-meta">
          <div class="meta-item"><div class="meta-value">${ex.sets}×${ex.reps}</div><div class="meta-label">Sets×Reps</div></div>
          <div class="meta-item"><div class="meta-value">${ex.tempo}</div><div class="meta-label">Tempo</div></div>
          ${ex.rest ? `<div class="meta-item"><div class="meta-value">${ex.rest}</div><div class="meta-label">Rest</div></div>` : ''}
          ${ex.rpe ? `<div class="meta-item"><div class="meta-value" style="color:var(--accent2,#a78bfa)">${ex.rpe}</div><div class="meta-label">RPE</div></div>` : ''}
        </div>
        <div class="exercise-instruction">${ex.instruction}</div>
        <div class="sets-log">`;

      const cardioType = getCardioType(ex.name);
      if (cardioType === 'swimming') {
        // Swimming: laps + time
        html += `<div class="sets-log-header">
            <div>Set</div><div style="text-align:center">Laps</div><div style="text-align:center">Time</div><div></div>
          </div>`;
        for (let s = 1; s <= ex.sets; s++) {
          const setData = exData['set' + s] || {};
          html += `<div class="set-row">
            <div class="set-num">${s}</div>
            <input class="set-input" type="number" inputmode="numeric" placeholder="laps"
              data-key="${exKey}" data-set="${s}" data-field="weight"
              value="${setData.weight || ''}" onchange="onSetChange(this)" ${disabled}>
            <input class="set-input" type="text" inputmode="text" placeholder="mm:ss"
              data-key="${exKey}" data-set="${s}" data-field="reps"
              value="${setData.reps || ''}" onchange="onSetChange(this)" ${disabled}>
            <button class="set-check ${setData.done ? 'done' : ''}"
              data-key="${exKey}" data-set="${s}"
              onclick="toggleSet(this)" ${disabled}>✓</button>
          </div>`;
        }
      } else if (cardioType === 'running' || cardioType === 'cycling') {
        // Running/Cycling: distance + time
        html += `<div class="sets-log-header">
            <div>Set</div><div style="text-align:center">Distance</div><div style="text-align:center">Time</div><div></div>
          </div>`;
        for (let s = 1; s <= ex.sets; s++) {
          const setData = exData['set' + s] || {};
          html += `<div class="set-row">
            <div class="set-num">${s}</div>
            <input class="set-input" type="number" inputmode="decimal" placeholder="km"
              data-key="${exKey}" data-set="${s}" data-field="weight"
              value="${setData.weight || ''}" onchange="onSetChange(this)" ${disabled}>
            <input class="set-input" type="text" inputmode="text" placeholder="mm:ss"
              data-key="${exKey}" data-set="${s}" data-field="reps"
              value="${setData.reps || ''}" onchange="onSetChange(this)" ${disabled}>
            <button class="set-check ${setData.done ? 'done' : ''}"
              data-key="${exKey}" data-set="${s}"
              onclick="toggleSet(this)" ${disabled}>✓</button>
          </div>`;
        }
      } else {

  let cardioData = {};
  try { cardioData = JSON.parse(localStorage.getItem(cardioKey) || '{}'); } catch {}

  // Also check session-added cardio types
  const sessionCardioKey = `cardio_active_${currentUser}_day${currentDayIndex}`;

        : [{f:'distance',l:'Distance (km)',p:'0'},{f:'time',l:'Time (min)',p:'0'},{f:'pace',l:ctype==='running'?'Pace (min/km)':'Avg Speed (km/h)',p:'0'}];
      if (ctype !== 'swimming') fields.push({f:'elevation',l:'Elevation (m)',p:'0'});
      fields.push({f:'hr',l:'Avg HR (bpm)',p:'0'},{f:'notes',l:'Notes',p:''});

        <div class="exercise-name" style="display:flex;justify-content:space-between;align-items:center;">
          <span>${icon} ${ctype.charAt(0).toUpperCase() + ctype.slice(1)}</span>
          <button onclick="removeCardioType('${ctype}')" style="background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;">✕</button>

      for (const fi of fields) {
        if (fi.f === 'notes') {

            <textarea class="notes-input cardio-input" data-cardio="${ctype}" data-cfield="${fi.f}"
              placeholder="${fi.l}" onchange="saveCardio()" ${disabled}>${cd[fi.f] || ''}</textarea></div>`;
        } else {

    html += '</div>';

  if (!isViewOnly) {
    html += `<div class="group-container" style="margin-top:16px;">
      <span class="group-label" style="background:var(--accent);color:#fff;">Add to Today</span>

          </div>
          <div>

            <input id="customExReps" type="number" inputmode="numeric" placeholder="10" value="10"
              style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:14px;">
          </div>
        </div>
        <button onclick="addCustomExercise()"
          style="width:100%;background:var(--accent);color:#fff;border:none;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;">+ Add Exercise</button>

        <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;">

// ==================== CARDIO PERSISTENCE ====================
function saveCardio() {
  if (isViewOnly) return;
  const cardioKey = `cardio_${currentUser}_day${currentDayIndex}`;
  const data = {};
  document.querySelectorAll('.cardio-input').forEach(el => {
    const ctype = el.dataset.cardio;
    const field = el.dataset.cfield;
    if (!data[ctype]) data[ctype] = {};
    const val = el.tagName === 'TEXTAREA' ? el.value : el.value;
    if (val) data[ctype][field] = val;
  });
  localStorage.setItem(cardioKey, JSON.stringify(data));
  // Sync cardio to server
  if (serverAvailable !== false) {
    fetch(`${SERVER_URL}/api/save-day`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user: currentUser, day_key: `cardio_day_${currentDayIndex}`, data, meta: {type: 'cardio'}}),
    }).catch(e => console.warn('[sync] cardio save failed:', e));
  }
}

// ==================== CUSTOM EXERCISE ====================
function addCustomExercise() {
  const name = document.getElementById('customExName').value.trim();
  const sets = parseInt(document.getElementById('customExSets').value) || 3;
  const reps = parseInt(document.getElementById('customExReps').value) || 10;
  if (!name) { alert('Enter an exercise name'); return; }

  // Store custom exercises in localStorage
  const customKey = `custom_exercises_${currentUser}_day${currentDayIndex}`;
  let customs = [];
  try { customs = JSON.parse(localStorage.getItem(customKey) || '[]'); } catch {}
  customs.push({name, sets, reps, order: `C${customs.length + 1}`});
  localStorage.setItem(customKey, JSON.stringify(customs));

  // Re-render
  renderDay();
}

function addCardioType(ctype) {
  const sessionCardioKey = `cardio_active_${currentUser}_day${currentDayIndex}`;
  let sessionCardio = [];
  try { sessionCardio = JSON.parse(localStorage.getItem(sessionCardioKey) || '[]'); } catch {}
  if (!sessionCardio.includes(ctype)) {
    sessionCardio.push(ctype);
    localStorage.setItem(sessionCardioKey, JSON.stringify(sessionCardio));
  }
  renderDay();
}

function removeCardioType(ctype) {
  // Remove from session list
  const sessionCardioKey = `cardio_active_${currentUser}_day${currentDayIndex}`;
  let sessionCardio = [];
  try { sessionCardio = JSON.parse(localStorage.getItem(sessionCardioKey) || '[]'); } catch {}
  sessionCardio = sessionCardio.filter(c => c !== ctype);
  localStorage.setItem(sessionCardioKey, JSON.stringify(sessionCardio));
  // Remove data for this type
  const cardioKey = `cardio_${currentUser}_day${currentDayIndex}`;
  let cardioData = {};
  try { cardioData = JSON.parse(localStorage.getItem(cardioKey) || '{}'); } catch {}
  delete cardioData[ctype];
  localStorage.setItem(cardioKey, JSON.stringify(cardioData));
  renderDay();
}

// ==================== WEIGHT HISTORY ====================
function showWeightHistory(exerciseName) {
  // Scan all days for this exercise and collect weights
  const history = [];
  const userInfo = programData?.users?.[currentUser];
  for (let i = 0; i < allDays.length; i++) {
    const data = loadDayData(i);
    for (const [key, sets] of Object.entries(data)) {
      // Match exercise by name in key (format: order_Exercise_Name)
      const keyName = key.replace(/^\w+_/, '').replace(/_/g, ' ');
      if (keyName.toLowerCase() !== exerciseName.toLowerCase()) continue;
      for (const [sk, sv] of Object.entries(sets)) {
        if (sk.startsWith('set') && sv.weight) {
          let date = `Day ${i+1}`;
          if (userInfo?.startDate) {
            const start = new Date(userInfo.startDate + 'T00:00:00');
            date = new Date(start.getTime() + i * 86400000).toISOString().split('T')[0];
          }
          history.push({date, set: sk, weight: parseFloat(sv.weight), reps: sv.reps || '?'});
        }
      }
    }
  }
  if (history.length === 0) { alert(`No weight history for ${exerciseName}`); return; }

  // Show as a simple modal with text-based chart
  const maxW = Math.max(...history.map(h => h.weight));
  let chartHtml = `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)this.remove()">
    <div style="background:var(--card);border-radius:16px;padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:12px;">&#9679; ${exerciseName}</h3>`;
  // Group by date, show latest per date
  const byDate = {};
  history.forEach(h => {
    if (!byDate[h.date]) byDate[h.date] = [];
    byDate[h.date].push(h);
  });
  for (const [date, sets] of Object.entries(byDate)) {
    const best = Math.max(...sets.map(s => s.weight));
    const barW = maxW > 0 ? Math.round(best / maxW * 100) : 0;
    const reps = sets.map(s => `${s.weight}×${s.reps}`).join(', ');
    chartHtml += `<div style="margin-bottom:8px;">
      <div style="font-size:11px;color:var(--text-dim);">${date}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="background:linear-gradient(90deg,var(--accent),var(--nn-warm));height:20px;border-radius:4px;width:${barW}%;min-width:2px;"></div>
        <span style="font-size:13px;white-space:nowrap;">${best}kg</span>
      </div>
      <div style="font-size:10px;color:var(--text-muted);">${reps}</div>
    </div>`;
  }
  chartHtml += `<button style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--card-border);background:var(--card);color:var(--text);margin-top:12px;cursor:pointer;" onclick="this.closest('[style*=fixed]').remove()">Close</button>
    </div></div>`;
  document.body.insertAdjacentHTML('beforeend', chartHtml);
}

// Try to match exercise name → body part using exercises.json embedded mappings
let exercisesDB = null;
async function loadExercisesDB() {
  if (exercisesDB) return exercisesDB;
  try {
    const r = await fetch('exercises.json?v=' + Date.now());
    exercisesDB = await r.json();
  } catch { exercisesDB = {}; }

function getCardioType(name) {
  const n = name.toLowerCase();
  if (n.includes('run') || n.includes('jog') || n.includes('sprint') || n.includes('tempo run') || n.includes('interval run') || n.includes('fartlek') || n.includes('easy run') || n.includes('long run') || n.includes('hill run') || n.includes('threshold'))
    return 'running';
  if (n.includes('cycl') || n.includes('bike') || n.includes('spin') || n.includes('ride'))
    return 'cycling';
  if (n.includes('swim') || n.includes('pool') || n.includes('freestyle') || n.includes('backstroke') || n.includes('breaststroke') || n.includes('butterfly'))
    return 'swimming';
  return null;
}

function getEquipmentIcon(name) {

function getExerciseBodyPart(exName) {
  if (!exercisesDB) return null;
  for (const [bodyPart, categories] of Object.entries(exercisesDB)) {
    for (const [cat, exList] of Object.entries(categories)) {
      for (const ex of exList) {
        if (ex.name.toLowerCase() === exName.toLowerCase()) return bodyPart;
      }
    }
  }
  // Fuzzy match: check if exercise name contains a body part keyword
  const lower = exName.toLowerCase();
  const hints = {
    'bench': 'Chest', 'press': 'Chest', 'fly': 'Chest', 'push up': 'Chest', 'pushup': 'Chest',
    'row': 'Back', 'pull': 'Back', 'lat': 'Back', 'deadlift': 'Back',
    'squat': 'Legs (Quads)', 'lunge': 'Legs (Quads)', 'leg press': 'Legs (Quads)', 'extension': 'Legs (Quads)',
    'curl': 'Biceps', 'hammer': 'Biceps',
    'tricep': 'Triceps', 'dip': 'Triceps', 'pushdown': 'Triceps', 'skull': 'Triceps',
    'shoulder': 'Shoulders', 'lateral': 'Shoulders', 'raise': 'Shoulders', 'ohp': 'Shoulders',
    'calf': 'Calves',
    'crunch': 'Core', 'plank': 'Core', 'ab ': 'Core', 'sit up': 'Core',
    'rdl': 'Legs (Hamstrings & Glutes)', 'hamstring': 'Legs (Hamstrings & Glutes)', 'glute': 'Legs (Hamstrings & Glutes)', 'hip thrust': 'Legs (Hamstrings & Glutes)',
  };
  for (const [kw, bp] of Object.entries(hints)) {
    if (lower.includes(kw)) return bp;
  }
  return null;
}

async function renderMetrics() {
  const container = document.getElementById('metricsContent');
  // Load metrics from server
  let entries = [];
  try {
    const resp = await authFetch(`${SERVER_URL}/api/metrics`);
    if (resp.ok) {
      const data = await resp.json();
      entries = data.entries || [];
    }
  } catch (e) { console.warn('[metrics] fetch failed:', e); }

  // Also check localStorage fallback
  const localKey = `metrics_${currentUser}`;
  let localEntries = [];
  try { localEntries = JSON.parse(localStorage.getItem(localKey) || '[]'); } catch {}

  // Merge: use server data if available, else local
  if (entries.length === 0 && localEntries.length > 0) entries = localEntries;

  let html = '';

  // Log new measurement form
  html += `<div class="metric-card">
    <h3 style="margin-bottom:12px;font-size:16px;">Log Measurement</h3>
    <div style="margin-bottom:10px;">
      <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:2px;">Date</label>
      <input type="date" id="metricDate" value="${new Date().toISOString().split('T')[0]}"

    </div>
    <div class="metric-input-row">`;
  for (const f of METRIC_FIELDS) {
    html += `<div>
      <label>${f.label}</label>
      <input type="number" inputmode="decimal" id="metric_${f.key}" placeholder="—" step="0.1">
    </div>`;
  }
  html += `</div>
    <button onclick="saveMetricEntry()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px;">Save Measurement</button>
  </div>`;

  // Latest stats summary
  if (entries.length > 0) {
    const latest = entries[entries.length - 1];
    html += `<div class="metric-card">
      <h3 style="margin-bottom:8px;font-size:16px;">Latest (${latest.date || '—'})</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;">`;
    for (const f of METRIC_FIELDS) {
      const val = latest[f.key];
      if (val) {
        html += `<div style="text-align:center;">
          <div style="font-size:18px;font-weight:700;color:var(--accent);">${val}</div>
          <div style="font-size:10px;color:var(--text-dim);">${f.label}</div>
        </div>`;
      }
    }
    html += '</div></div>';

    // Progress chart (weight over time as simple bar chart)
    const weightEntries = entries.filter(e => e.weight_kg).slice(-20);
    if (weightEntries.length > 1) {
      const maxW = Math.max(...weightEntries.map(e => parseFloat(e.weight_kg)));
      const minW = Math.min(...weightEntries.map(e => parseFloat(e.weight_kg)));
      html += `<div class="metric-card">
        <h3 style="margin-bottom:8px;font-size:16px;">Weight Trend</h3>`;
      for (const e of weightEntries) {
        const w = parseFloat(e.weight_kg);
        const range = maxW - minW || 1;
        const barPct = 30 + ((w - minW) / range) * 70;
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <div style="font-size:10px;color:var(--text-dim);width:60px;">${e.date || '—'}</div>
          <div style="flex:1;height:18px;background:var(--input-bg);border-radius:4px;overflow:hidden;">
            <div style="width:${barPct}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--nn-warm));border-radius:4px;"></div>
          </div>
          <div style="font-size:12px;width:45px;text-align:right;">${w}kg</div>
        </div>`;
      }
      html += '</div>';
    }

    // History table
    html += `<div class="metric-card">
      <h3 style="margin-bottom:8px;font-size:16px;">All Entries</h3>
      <div style="overflow-x:auto;">`;
    for (const entry of [...entries].reverse().slice(0, 30)) {
      const vals = METRIC_FIELDS.map(f => entry[f.key] ? `${f.label.split(' ')[0]}: ${entry[f.key]}` : '').filter(Boolean).join(' · ');
      html += `<div class="metric-history-entry">
        <span style="color:var(--text-dim);min-width:80px;">${entry.date || '—'}</span>
        <span>${vals || 'No data'}</span>
      </div>`;
    }
    html += '</div></div>';
  }

  container.innerHTML = html;
}

async function saveMetricEntry() {
  const date = document.getElementById('metricDate').value;
  const entry = { date };
  let hasData = false;
  for (const f of METRIC_FIELDS) {
    const val = document.getElementById(`metric_${f.key}`).value;
    if (val) {
      entry[f.key] = parseFloat(val);
      hasData = true;
    }
  }
  if (!hasData) { alert('Enter at least one measurement'); return; }

  // Save to server
  try {
    await authFetch(`${SERVER_URL}/api/save-metrics`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(entry),
    });
  } catch (e) { console.warn('[metrics] server save failed:', e); }

  // Also save to localStorage
  const localKey = `metrics_${currentUser}`;
  let entries = [];
  try { entries = JSON.parse(localStorage.getItem(localKey) || '[]'); } catch {}
  entries.push(entry);
  localStorage.setItem(localKey, JSON.stringify(entries));

  renderMetrics();
}

// ==================== DATA PERSISTENCE ====================
const SERVER_URL = window.location.origin;
let serverAvailable = null; // null = unknown, true/false after first check

async function checkServer() {
  if (serverAvailable !== null) return serverAvailable;
  try {
    const r = await fetch(`${SERVER_URL}/api/health`, {method: 'GET'});
    serverAvailable = r.ok;
  } catch { serverAvailable = false; }
  return serverAvailable;
}

function getStorageKey(dayIndex) {
  return `workout_${currentUser}_day${dayIndex}`;
}

function loadDayData(dayIndex) {
  try {
    const raw = localStorage.getItem(getStorageKey(dayIndex));
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveDayData(dayIndex, data) {
  localStorage.setItem(getStorageKey(dayIndex), JSON.stringify(data));
  // Also sync to server
  syncDayToServer(dayIndex, data);
}

function syncDayToServer(dayIndex, data) {
  if (serverAvailable === false || !accessToken) return;
  const day = allDays[dayIndex];
  const meta = day ? {week: day.week, day: day.day, label: day.label || ''} : {};
  const userInfo = programData?.users?.[currentUser];
  if (userInfo?.startDate) {
    const start = new Date(userInfo.startDate + 'T00:00:00');
    meta.date = new Date(start.getTime() + dayIndex * 86400000).toISOString().split('T')[0];
  }
  authFetch(`${SERVER_URL}/api/save-day`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({day_key: `day_${dayIndex}`, data, meta}),
  }).catch(e => console.warn('[sync] save-day failed:', e));
}

function saveCurrentDay() {
  if (isViewOnly || viewMode !== 'day') return;
  const data = collectCurrentData();
  if (Object.keys(data).length > 0) {
    saveDayData(currentDayIndex, data);
  }
}

// Pull workout data from server (for cross-device access)
async function pullDataFromServer() {
  if (!(await checkServer()) || !accessToken) return;
  try {
    const resp = await authFetch(`${SERVER_URL}/api/data`);
    if (!resp.ok) return;
    const serverData = await resp.json();
    const logs = serverData.workout_logs || {};
    let merged = 0;
    for (const [dayKey, entry] of Object.entries(logs)) {
      const match = dayKey.match(/^day_(\d+)$/);
      if (!match) continue;
      const idx = parseInt(match[1]);
      const localData = loadDayData(idx);
      // Only fill in from server if localStorage is empty for this day
      if (Object.keys(localData).length === 0 && entry.data && Object.keys(entry.data).length > 0) {
        localStorage.setItem(getStorageKey(idx), JSON.stringify(entry.data));
        merged++;
      }
    }
    if (merged > 0) {
      console.log(`[sync] Pulled ${merged} days from server`);
      // Re-render if we got new data
      if (viewMode === 'week') renderWeekOverview();
      else renderDayDetail();
    }
  } catch (e) {
    console.warn('[sync] Pull from server failed:', e);
  }
}

// Sync all existing localStorage data to server on login
async function syncAllToServer() {
  if (!(await checkServer())) return;
  const days = {};
  for (let i = 0; i < allDays.length; i++) {
    const data = loadDayData(i);
    if (Object.keys(data).length > 0) {
      const day = allDays[i];
      const meta = day ? {week: day.week, day: day.day} : {};
      const userInfo = programData?.users?.[currentUser];
      if (userInfo?.startDate) {
        const start = new Date(userInfo.startDate + 'T00:00:00');
        meta.date = new Date(start.getTime() + i * 86400000).toISOString().split('T')[0];
      }
      days[`day_${i}`] = {data, meta};
    }
  }
  if (Object.keys(days).length > 0 && accessToken) {
    authFetch(`${SERVER_URL}/api/sync-all`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({days}),
    }).catch(e => console.warn('[sync] sync-all failed:', e));
  }
}

function collectCurrentData() {
  const data = {};
  document.querySelectorAll('.set-input').forEach(input => {
    const key = input.dataset.key;
    const set = input.dataset.set;
    const field = input.dataset.field;
    if (!key || !set || !field) return; // skip cardio/custom form inputs
    const setKey = 'set' + set;
    if (!data[key]) data[key] = {};
    if (!data[key][setKey]) data[key][setKey] = {};
    if (input.value) data[key][setKey][field] = input.value;
  });
  document.querySelectorAll('.set-check.done').forEach(btn => {
    const key = btn.dataset.key;
    const set = 'set' + btn.dataset.set;
    if (!data[key]) data[key] = {};
    if (!data[key][set]) data[key][set] = {};
    data[key][set].done = true;
  });
  document.querySelectorAll('.notes-input').forEach(ta => {
    const key = ta.dataset.key;
    if (ta.value.trim()) {
      if (!data[key]) data[key] = {};
      data[key].notes = ta.value.trim();
    }
  });
  return data;
}

function onSetChange(input) {
  saveCurrentDay();
  updateDayDetailStats();
}
function onNotesChange(ta) { saveCurrentDay(); }
function toggleSet(btn) {
  if (isViewOnly) return;
  btn.classList.toggle('done');
  // If marking done, auto-fill empty reps from placeholder (preset)
  if (btn.classList.contains('done')) {
    const row = btn.closest('.set-row');
    if (row) {
      const repsInput = row.querySelector('.set-input[data-field="reps"]');
      if (repsInput && !repsInput.value && repsInput.placeholder) {
        repsInput.value = repsInput.placeholder;
      }
    }
  }
  saveCurrentDay();
  updateDayDetailStats();
}

function updateDayDetailStats() {
  // Recalculate stats after set change without full re-render
  const day = allDays[currentDayIndex];
  if (!day || day.isRest) return;
  const data = collectCurrentData();
  let totalSets = 0, doneSets = 0, tonnage = 0;
  for (const group of day.exerciseGroups) {
    for (const ex of group.exercises) {
      const exKey = ex.order + '_' + ex.name.replace(/\s+/g, '_');
      const exData = data[exKey] || {};
      for (let s = 1; s <= ex.sets; s++) {
        totalSets++;
        const sd = exData['set' + s] || {};
        if (sd.done) {
          doneSets++;
          const w = parseFloat(sd.weight) || 0;
          const r = parseInt(sd.reps) || 0;
          tonnage += w * r;
        }
      }
    }
  }
  const pct = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;
  const statsEl = document.getElementById('dayDetailStats');
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="day-detail-stat">
        <div class="dds-value" style="color:${pct === 100 ? 'var(--green)' : 'var(--text)'}">${pct}%</div>
        <div class="dds-label">Complete</div>
      </div>
      <div class="day-detail-stat">
        <div class="dds-value">${doneSets}/${totalSets}</div>
        <div class="dds-label">Sets</div>
      </div>
      <div class="day-detail-stat">
        <div class="dds-value">${formatTonnage(tonnage)}</div>
        <div class="dds-label">Tonnage</div>
      </div>`;
  }
}

function showHistory() {
  if (!isViewOnly) saveCurrentDay();
  document.getElementById('workoutScreen').classList.add('hidden');
  document.getElementById('metricsScreen').classList.add('hidden');
  document.getElementById('historyScreen').classList.remove('hidden');

  const container = document.getElementById('historyContent');
  let html = '<h2>Workout History</h2>';

  let found = false;
  const userInfo = programData.users[currentUser];
  const startDate = userInfo.startDate ? new Date(userInfo.startDate + 'T00:00:00') : null;

  for (let i = allDays.length - 1; i >= 0; i--) {
    const day = allDays[i];
    if (day.isRest) continue;

    const data = loadDayData(i);
    if (Object.keys(data).length === 0) continue;

    found = true;
    const dayDate = startDate ? new Date(startDate.getTime() + i * 86400000) : null;

    for (const group of day.exerciseGroups) {
      for (const ex of group.exercises) {
        const exKey = ex.order + '_' + ex.name.replace(/\s+/g, '_');
        const exData = data[exKey];
        if (!exData) continue;

        let setsStr = [];
        for (let s = 1; s <= ex.sets; s++) {
          const sd = exData['set' + s];
          if (sd && (sd.weight || sd.reps)) {
            setsStr.push(`${sd.weight || '?'}kg × ${sd.reps || '?'}`);
          }
        }
        if (setsStr.length === 0) continue;

        html += `<div class="history-item">
          <div class="hi-date">W${day.week}D${day.day}${dayDate ? ' · ' + dayDate.toLocaleDateString('en-US', {month:'short', day:'numeric'}) : ''}</div>
          <div class="hi-exercise">${ex.name}</div>
          <div class="hi-sets">${setsStr.join(' / ')}</div>
          ${exData.notes ? `<div class="hi-sets" style="margin-top:4px;font-style:italic;">${exData.notes}</div>` : ''}
        </div>`;
      }
    }
  }

  if (!found) html += '<p style="color:var(--text-dim);text-align:center;padding:40px 0;">No logged workouts yet.</p>';
  container.innerHTML = html;
}

// ==================== REST TIMER ====================
let timerSeconds = 0;
let timerTotal = 0;
let timerInterval = null;
let timerRunning = false;

function parseRestTime(restStr) {
  const s = restStr.toLowerCase().trim();
  const minMatch = s.match(/^(\d+)\s*min/);
  if (minMatch) return parseInt(minMatch[1]) * 60;
  const colonMatch = s.match(/^(\d+):(\d+)/);
  if (colonMatch) return parseInt(colonMatch[1]) * 60 + parseInt(colonMatch[2]);
  const secMatch = s.match(/^(\d+)/);
  if (secMatch) return parseInt(secMatch[1]) > 300 ? 120 : parseInt(secMatch[1]);
  return 60;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
  document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);
  const ring = document.getElementById('timerRing');
  const circumference = 754;
  const progress = timerTotal > 0 ? (timerSeconds / timerTotal) : 0;
  ring.style.strokeDashoffset = circumference * (1 - progress);
  if (timerSeconds <= 0 && timerTotal > 0) {
    ring.style.stroke = '#4ade80';
  } else {
    ring.style.stroke = '';
  }
}

function openTimer(restStr) {
  const seconds = parseRestTime(restStr);
  timerSeconds = seconds;
  timerTotal = seconds;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timerStartBtn').textContent = 'Start';
  updateTimerDisplay();
  document.getElementById('restTimerOverlay').classList.remove('hidden');
}

function setTimerPreset(seconds) {
  timerSeconds = seconds;
  timerTotal = seconds;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timerStartBtn').textContent = 'Start';
  updateTimerDisplay();
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerStartBtn').textContent = 'Resume';
  } else {
    if (timerSeconds <= 0) timerSeconds = timerTotal;
    timerRunning = true;
    document.getElementById('timerStartBtn').textContent = 'Pause';
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerStartBtn').textContent = 'Restart';
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          for (let i = 0; i < 3; i++) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.3;
            osc.start(ctx.currentTime + i * 0.25);
            osc.stop(ctx.currentTime + i * 0.25 + 0.15);
          }
        } catch(e) {}
      }
    }, 1000);
  }
}

function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  document.getElementById('restTimerOverlay').classList.add('hidden');
}

let archiveView = 'current'; // 'current' or 'archived'

function getArchivedDays() {
  try {
    const raw = localStorage.getItem(`workout_${currentUser}_archived_days`);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveArchivedDays(days) {
  localStorage.setItem(`workout_${currentUser}_archived_days`, JSON.stringify(days));
}

function isDayArchived(dayIndex) {
  return getArchivedDays().includes(dayIndex);
}

function toggleDayArchive(dayIndex) {
  const archived = getArchivedDays();
  const idx = archived.indexOf(dayIndex);
  if (idx === -1) {
    archived.push(dayIndex);
  } else {
    archived.splice(idx, 1);
  }
  saveArchivedDays(archived);
  renderWeekOverview();
}

// Check if a week has any visible (non-archived) non-rest days
function weekHasVisibleDays(weekIndex) {
  const wk = weekMap[weekIndex];
  const archived = getArchivedDays();
  for (let i = wk.startDayIndex; i <= wk.endDayIndex; i++) {
    const day = allDays[i];
    if (day.isRest) continue;
    if (archiveView === 'current' && !archived.includes(i)) return true;
    if (archiveView === 'archived' && archived.includes(i)) return true;
  }
  return false;
}

function findNextVisibleWeek(fromIndex, direction) {
  let i = fromIndex + direction;
  while (i >= 0 && i < weekMap.length) {
    if (weekHasVisibleDays(i)) return i;
    i += direction;
  }
  return null;
}

function setArchiveView(view) {
  archiveView = view;
  // Find first week with visible days
  let found = false;
  for (let i = 0; i < weekMap.length; i++) {
    if (weekHasVisibleDays(i)) {
      currentWeekIndex = i;
      found = true;
      break;
    }
  }
  if (!found) currentWeekIndex = 0;
  renderWeekOverview();
  updateArchiveUI();
}

function updateArchiveUI() {
  document.getElementById('btnCurrent').classList.toggle('active', archiveView === 'current');
  document.getElementById('btnArchived').classList.toggle('active', archiveView === 'archived');
}
