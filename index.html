function showWhoopConnect() {
  document.getElementById('whoopBannerTitle').textContent = 'Connect Whoop';
  document.getElementById('whoopContent').innerHTML =
    '<div class="whoop-connect-prompt">' +
    '<p>Link your Whoop to see recovery, strain & sleep</p>' +
    '<button class="whoop-connect-btn" onclick="connectWhoop(event)">Connect Whoop</button>' +
    '</div>';
}

async function connectWhoop(e) {
  if (e) e.stopPropagation();
  try {
    const resp = await authFetch(`${WHOOP_SERVER}/whoop/auth?user=${encodeURIComponent(currentUser)}`);
    const data = await resp.json();
    if (data.auth_url) {
      // Try popup first (desktop), fall back to redirect (mobile)
      const popup = window.open(data.auth_url, 'whoop_auth', 'width=500,height=700');
      if (!popup || popup.closed || typeof popup.closed === 'undefined') {
        // Popup blocked (mobile browsers) — redirect instead
        window.location.href = data.auth_url;
        return;
      }
      // Listen for success message from popup (desktop)
      window.addEventListener('message', function handler(ev) {
        if (ev.data === 'whoop_connected') {
          window.removeEventListener('message', handler);
          loadWhoopData();
        }
      });
    } else {
      alert(data.error || 'Could not start Whoop authorization.');
    }
  } catch (e) {
    alert('Could not reach the server.');
  }
}

async function loadWhoopData() {
  document.getElementById('whoopBannerTitle').textContent = 'Whoop';
  document.getElementById('whoopContent').innerHTML = '<div class="whoop-loading">Loading...</div>';

  try {
    const resp = await authFetch(`${WHOOP_SERVER}/whoop/summary?user=${encodeURIComponent(currentUser)}`);
    if (!resp.ok) {
      if (resp.status === 401) { showWhoopConnect(); return; }
      throw new Error('API error');
    }
    const data = await resp.json();
    if (data.error) {
      if (data.error === 'not_connected') { showWhoopConnect(); return; }
      throw new Error(data.error);
    }
    renderWhoopData(data);
    saveWhoopSnapshot(data);
  } catch (e) {
    document.getElementById('whoopContent').innerHTML =
      '<div class="whoop-loading">Unable to load Whoop data</div>';
  }
}

function renderWhoopData(data) {
  // Extract values with safe fallbacks
  let recoveryScore = '--';
  let recoveryClass = '';
  let strain = '--';
  let sleepScore = '--';
  let hrv = '--';
  let rhr = '--';

  // Recovery (single object from /cycle/{id}/recovery, or records array)
  if (data.recovery) {
    const rec = data.recovery.records ? data.recovery.records[0] : data.recovery;
    const score = rec?.score?.recovery_score;
    if (score != null) {
      recoveryScore = Math.round(score);
      if (recoveryScore >= 67) recoveryClass = 'whoop-recovery-green';
      else if (recoveryScore >= 34) recoveryClass = 'whoop-recovery-yellow';
      else recoveryClass = 'whoop-recovery-red';
    }
    const h = rec?.score?.hrv_rmssd_milli;
    if (h != null) hrv = Math.round(h);
    const r = rec?.score?.resting_heart_rate;
    if (r != null) rhr = Math.round(r);
  }

  // Strain
  if (data.strain && data.strain.records && data.strain.records.length > 0) {
    const cyc = data.strain.records[0];
    const s = cyc.score?.strain;
    if (s != null) strain = s.toFixed(1);
  }

  // Sleep
  if (data.sleep && data.sleep.records && data.sleep.records.length > 0) {
    const slp = data.sleep.records[0];
    const perf = slp.score?.sleep_performance_percentage;
    if (perf != null) sleepScore = Math.round(perf);
  }

  // Update banner title with recovery score
  const titleEl = document.getElementById('whoopBannerTitle');
  if (recoveryScore !== '--') {
    titleEl.innerHTML = `Whoop &middot; <span class="${recoveryClass}">${recoveryScore}%</span>`;
  }

  document.getElementById('whoopContent').innerHTML =
    '<div class="whoop-cards">' +
      '<div class="whoop-card">' +
        '<div class="whoop-card-label">Recovery</div>' +
        `<div class="whoop-card-value ${recoveryClass}">${recoveryScore}<span style="font-size:14px">%</span></div>` +
      '</div>' +
      '<div class="whoop-card">' +
        '<div class="whoop-card-label">Strain</div>' +
        `<div class="whoop-card-value">${strain}</div>` +
      '</div>' +
      '<div class="whoop-card">' +
        '<div class="whoop-card-label">Sleep</div>' +
        `<div class="whoop-card-value">${sleepScore}<span style="font-size:14px">%</span></div>` +
      '</div>' +
    '</div>' +
    '<div class="whoop-cards" style="grid-template-columns: repeat(2, 1fr); margin-top: 10px;">' +
      '<div class="whoop-card">' +
        '<div class="whoop-card-label">HRV</div>' +
        `<div class="whoop-card-value">${hrv}<span style="font-size:14px">ms</span></div>` +
      '</div>' +
      '<div class="whoop-card">' +
        '<div class="whoop-card-label">Resting HR</div>' +
        `<div class="whoop-card-value">${rhr}<span style="font-size:14px">bpm</span></div>` +
      '</div>' +
    '</div>' +
    '<div style="text-align:center"><button class="whoop-disconnect-btn" onclick="disconnectWhoop(event)">Disconnect Whoop</button></div>';
}

function saveWhoopSnapshot(data) {
  // Extract key metrics and save to server for coach visibility
  const snapshot = {date: new Date().toISOString().split('T')[0]};
  if (data.recovery?.records?.[0]?.score) {
    const s = data.recovery.records[0].score;
    snapshot.recovery = Math.round(s.recovery_score || 0);
    snapshot.hrv = Math.round(s.hrv_rmssd_milli || 0);
    snapshot.rhr = Math.round(s.resting_heart_rate || 0);
    snapshot.spo2 = s.spo2_percentage ? Math.round(s.spo2_percentage * 10) / 10 : null;
  }
  if (data.strain?.records?.[0]?.score) {
    snapshot.strain = Math.round(data.strain.records[0].score.strain * 10) / 10;
  }
  if (data.sleep?.records?.[0]?.score) {
    const s = data.sleep.records[0].score;
    snapshot.sleep_score = Math.round(s.sleep_performance_percentage || 0);
    snapshot.sleep_consistency = Math.round(s.sleep_consistency_percentage || 0);
  }
  authFetch(`${SERVER_URL}/api/save-whoop`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({snapshot}),
  }).catch(e => console.warn('[sync] save-whoop failed:', e));
}

async function disconnectWhoop(e) {
  if (e) e.stopPropagation();
  if (!confirm('Disconnect your Whoop account?')) return;
  try {
    await authFetch(`${WHOOP_SERVER}/whoop/disconnect?user=${encodeURIComponent(currentUser)}`);
  } catch {}
  showWhoopConnect();
}

// ==================== START ====================
init();
</script>
